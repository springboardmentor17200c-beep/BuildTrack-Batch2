<main class="min-h-screen bg-build-field">
  <header class="border-b border-build-line bg-white">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4 sm:px-6 lg:px-8">
      <a class="text-lg font-bold text-build-ink" routerLink="/dashboard">BuildTrack</a>
      <button class="bt-secondary" type="button" (click)="auth.logout()">Sign out</button>
    </div>
  </header>

  <section class="mx-auto grid max-w-6xl gap-6 px-4 py-8 sm:px-6 lg:grid-cols-[0.7fr_1fr] lg:px-8">
    <aside class="rounded-md border border-build-line bg-white p-6 shadow-panel">
      <p class="text-sm font-semibold text-build-green">Profile</p>
      <h1 class="mt-3 text-3xl font-bold">{{ user()?.fullName }}</h1>
      <dl class="mt-6 space-y-4 text-sm">
        <div>
          <dt class="bt-label">Role</dt>
          <dd class="mt-1 font-semibold">{{ user()?.role }}</dd>
        </div>
        <div>
          <dt class="bt-label">Email</dt>
          <dd class="mt-1">{{ user()?.email }}</dd>
        </div>
        <div>
          <dt class="bt-label">Status</dt>
          <dd class="mt-1 inline-flex rounded-md bg-amber-100 px-2 py-1 text-xs font-semibold text-amber-800">{{ user()?.status }}</dd>
        </div>
      </dl>
    </aside>

    <section class="rounded-md border border-build-line bg-white p-6 shadow-panel sm:p-8">
      <h2 class="text-2xl font-bold">Profile management</h2>
      <form class="mt-8 grid gap-5" [formGroup]="form" (ngSubmit)="submit()">
        <label class="block">
          <span class="bt-label">Full name</span>
          <input class="bt-field mt-1.5" type="text" formControlName="fullName">
        </label>

        <label class="block">
          <span class="bt-label">Phone</span>
          <input class="bt-field mt-1.5" type="tel" formControlName="phone">
        </label>

        <label class="block">
          <span class="bt-label">Company</span>
          <input class="bt-field mt-1.5" type="text" formControlName="company">
        </label>

        <p *ngIf="message" class="rounded-md border border-green-200 bg-green-50 px-3 py-2 text-sm text-green-700">{{ message }}</p>
        <p *ngIf="errorMessage" class="rounded-md border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">{{ errorMessage }}</p>

        <div class="flex flex-col gap-3 sm:flex-row">
          <button class="bt-primary flex-1" type="submit" [disabled]="isSubmitting">
            {{ isSubmitting ? "Saving..." : "Save changes" }}
          </button>
          <a class="bt-secondary flex-1" routerLink="/dashboard">Dashboard</a>
        </div>
      </form>
    </section>
  </section>
</main>
