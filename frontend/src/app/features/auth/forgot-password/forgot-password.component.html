<div class="auth-page">
  <div class="auth-skyline"></div>

  <div class="auth-card">
    <div class="auth-brand">
      <span class="auth-brand__mark">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 21h18" stroke="white" stroke-width="2" stroke-linecap="round" />
          <path d="M5 21V9l6-5 6 5v12" stroke="white" stroke-width="2" stroke-linejoin="round" />
          <path d="M10 21v-6h4v6" stroke="white" stroke-width="2" stroke-linejoin="round" />
        </svg>
      </span>
      <div class="auth-brand__name">Build<span>Track</span></div>
    </div>

    <h1 class="auth-title" style="margin-top: 18px;">Reset your password</h1>
    <p class="auth-subtitle">Enter your email address and we'll send you a link to reset your password.</p>

    <ng-container *ngIf="!linkSent(); else sentState">
      <form [formGroup]="form" (ngSubmit)="submit()">
        <label class="field-label" for="email">Email</label>
        <div class="input-wrap">
          <input id="email" type="email" formControlName="email" placeholder="Enter your email" autocomplete="email" />
        </div>
        <p class="field-error" *ngIf="form.get('email')?.touched && form.get('email')?.invalid">
          Enter a valid email address.
        </p>

        <button type="submit" class="auth-submit" [disabled]="isSubmitting()" style="margin-top: 10px;">
          <span *ngIf="!isSubmitting()">Send Reset Link</span>
          <span *ngIf="isSubmitting()">Sending…</span>
        </button>
      </form>
    </ng-container>

    <ng-template #sentState>
      <div style="text-align:center; padding: 10px 0 4px;">
        <i class="fa-solid fa-circle-check" style="font-size:34px; color:#16a34a;"></i>
        <p style="margin: 14px 0 0; font-size: 14px; color: var(--slate);">
          If an account exists for that email, a reset link is on its way.
        </p>
      </div>
    </ng-template>

    <p class="auth-footer">Remember your password? <a class="link" routerLink="/auth/login">Sign in</a></p>
  </div>
</div>
