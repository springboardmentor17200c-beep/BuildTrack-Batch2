<main class="flex min-h-screen items-center justify-center bg-build-field px-4 py-10">
  <section class="w-full max-w-md rounded-md border border-build-line bg-white p-6 shadow-panel sm:p-8">
    <p class="text-sm font-semibold text-build-green">Account recovery</p>
    <h1 class="mt-3 text-3xl font-bold">Reset password</h1>
    <p class="mt-3 text-sm leading-6 text-build-steel">Enter the email linked to your BuildTrack role.</p>

    <form class="mt-8 space-y-5" [formGroup]="form" (ngSubmit)="submit()">
      <label class="block">
        <span class="bt-label">Email</span>
        <input class="bt-field mt-1.5" type="email" formControlName="email" autocomplete="email">
      </label>

      <p *ngIf="errorMessage" class="rounded-md border border-red-200 bg-red-50 px-3 py-2 text-sm text-red-700">{{ errorMessage }}</p>
      <p *ngIf="successMessage" class="rounded-md border border-green-200 bg-green-50 px-3 py-2 text-sm text-green-700">{{ successMessage }}</p>

      <button class="bt-primary w-full" type="submit" [disabled]="isSubmitting">
        {{ isSubmitting ? "Checking..." : "Continue" }}
      </button>
    </form>

    <a class="mt-6 inline-flex text-sm font-semibold text-build-green hover:underline" routerLink="/login">Return to login</a>
  </section>
</main>
